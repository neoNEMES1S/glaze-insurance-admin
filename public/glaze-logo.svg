      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="50%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="shieldGrad2" x1="100" y1="0" x2="100" y2="200" gradientUnits="userSpaceOnUse">
