  <line x1="100" y1="85" x2="100" y2="165" stroke="white" stroke-width="5" opacity="0.8" stroke-linecap="round"/>
  <line x1="115" y1="95" x2="115" y2="160" stroke="white" stroke-width="4" opacity="0.6" stroke-linecap="round"/>
  <!-- Company name -->
